<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ FPU固定回線 総合管理システム</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#070a13',
                        cardBg: '#111625',
                        borderStroke: '#1e2538',
                        accentGreen: '#10b981',
                        accentBlue: '#38bdf8',
                        accentOrange: '#fb923c'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 90px);
            min-height: 100dvh;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .view-content { display: none; }
        .view-content.active { display: block; }

        .sortable-ghost {
            opacity: 0.3;
            background-color: #1e2538 !important;
            border: 2px dashed #38bdf8 !important;
        }
        .sortable-chosen {
            background-color: #1a2035 !important;
        }
    </style>
</head>
<body class="bg-bgDark text-slate-100 font-sans select-none overflow-x-hidden">

    <div id="welcome-view" class="fixed inset-0 bg-bgDark z-50 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-cardBg border border-borderStroke p-6 rounded-2xl shadow-2xl flex flex-col max-h-[90dvh]">
            
            <div class="flex justify-between items-center mb-6 shrink-0">
                <h2 class="text-base font-black text-white flex items-center gap-2">
                    <i class="fas fa-folder-open text-accentBlue"></i> 大会ファイルを選択
                </h2>
                <button onclick="openCreateModal()" class="bg-emerald-950/40 border border-accentGreen text-accentGreen text-xs font-bold px-4 py-2 rounded-full hover:bg-accentGreen hover:text-bgDark transition-all">
                    <i class="fas fa-plus mr-1"></i> 新規作成
                </button>
            </div>
            
            <div id="program-list-box" class="overflow-y-auto space-y-3 no-scrollbar flex-1 pr-1">
                <div class="text-xs text-slate-500 font-mono text-center py-4">番組ファイルを読込中...</div>
            </div>

            <div id="system-status-msg" class="text-rose-400 text-[11px] font-bold text-center mt-3 empty:hidden bg-rose-950/20 border border-rose-500/30 p-2 rounded-xl"></div>
        </div>
    </div>

    <div id="create-modal" class="fixed inset-0 bg-bgDark/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="w-full max-w-sm bg-cardBg border border-borderStroke p-6 rounded-2xl shadow-2xl space-y-4">
            <h3 class="text-sm font-black text-accentBlue flex items-center gap-2">
                <i class="fas fa-plus-circle"></i> 新しい中継番組・大会の作成
            </h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">番組ID / Program ID (半角英数字)</label>
                    <input type="text" id="new-program-id" placeholder="例: ekiden-2026" class="w-full bg-bgDark border border-borderStroke rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-accentBlue placeholder-slate-600 block transition-all font-mono">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">番組名・大会名称 / Tournament Title</label>
                    <input type="text" id="new-program-title" placeholder="例: 全日本大学駅伝2026" class="w-full bg-bgDark border border-borderStroke rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-accentBlue placeholder-slate-600 block transition-all">
                </div>
            </div>
            <div class="flex gap-3 justify-end pt-2 text-xs font-bold">
                <button onclick="closeCreateModal()" class="border border-borderStroke text-slate-400 px-4 py-2.5 rounded-xl hover:bg-slate-800 transition">キャンセル</button>
                <button onclick="submitNewProgram()" class="bg-accentGreen text-bgDark px-5 py-2.5 rounded-xl hover:bg-emerald-600 transition">保存して登録</button>
            </div>
        </div>
    </div>

    <div id="edit-program-modal" class="fixed inset-0 bg-bgDark/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="w-full max-w-sm bg-cardBg border border-borderStroke p-6 rounded-2xl shadow-2xl space-y-4">
            <h3 class="text-sm font-black text-accentBlue flex items-center gap-2">
                <i class="fas fa-edit"></i> 番組名の変更
            </h3>
            <div>
                <label class="block text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">番組名・大会名称</label>
                <input type="text" id="edit-program-title" placeholder="新しい番組名を入力" class="w-full bg-bgDark border border-borderStroke rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-accentBlue placeholder-slate-600 block transition-all">
            </div>
            <div class="flex gap-3 justify-end pt-2 text-xs font-bold">
                <button onclick="closeEditProgramModal()" class="border border-borderStroke text-slate-400 px-4 py-2.5 rounded-xl hover:bg-slate-800 transition">キャンセル</button>
                <button onclick="submitEditProgramTitle()" class="bg-accentBlue text-bgDark px-5 py-2.5 rounded-xl hover:bg-sky-600 transition">変更を保存</button>
            </div>
        </div>
    </div>

    <div class="app-header sticky top-0 z-40 bg-cardBg/90 backdrop-blur-md px-5 py-4 border-b border-borderStroke flex justify-between items-center">
        <div class="flex items-center gap-2 max-w-[60%] min-w-0">
            <div id="active-program-display" class="text-base font-black text-accentBlue truncate">番組未選択</div>
            <button onclick="openEditProgramModal()" id="btn-edit-program" class="hidden text-slate-500 hover:text-accentBlue text-xs p-1 transition" title="番組名を編集">
                <i class="fas fa-edit"></i>
            </button>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="location.reload()" class="text-[10px] bg-slate-800 border border-borderStroke text-slate-400 px-2.5 py-1 rounded-md active:bg-slate-700 transition">大会変更</button>
            <div class="status-badge flex items-center gap-2 text-[10px] font-mono font-bold bg-bgDark border border-borderStroke px-3 py-1.5 rounded-full text-slate-300">
                <div class="pulse"></div><span>CLOUD CONNECTED</span>
            </div>
        </div>
    </div>

    <div id="view-dashboard" class="view-content active p-4 space-y-4">
        
        <div class="bg-cardBg border border-borderStroke rounded-2xl p-4 shadow-xl">
            <div class="flex flex-col md:flex-row md:items-center gap-3">
                <div class="shrink-0 flex items-center gap-2 text-xs font-black text-accentBlue uppercase tracking-wider">
                    <i class="fas fa-comment-alt text-accentBlue animate-pulse"></i> クイックセンターメモ・Ch更新
                </div>
                <div class="flex-1 flex flex-wrap gap-2">
                    <select id="dash-link-select" class="bg-bgDark border border-borderStroke rounded-xl px-2 py-2 text-white text-xs outline-none focus:border-accentBlue font-bold min-w-[120px] flex-1 md:flex-none"></select>
                    <select id="dash-phase-select" class="bg-bgDark border border-borderStroke rounded-xl px-2 py-2 text-white text-xs outline-none focus:border-accentBlue font-bold min-w-[80px]">
                        <option value="tech">技術</option>
                        <option value="run">走行</option>
                        <option value="rehe">リハ</option>
                        <option value="prod" selected>本番</option>
                    </select>
                    <input type="text" id="dash-channel-input" placeholder="Ch (例: C2H)" class="bg-bgDark border border-borderStroke rounded-xl px-3 py-2 text-amber-400 text-xs font-black outline-none focus:border-accentBlue uppercase placeholder-slate-600 w-[90px]">
                    
                    <input type="text" id="dash-center-memo" placeholder="状況メモを入力" class="flex-1 bg-bgDark border border-borderStroke rounded-xl px-3 py-2 text-white text-xs outline-none focus:border-accentBlue placeholder-slate-600 transition-all min-w-[150px]">
                    <button onclick="submitDashCenterMemo()" class="bg-accentBlue hover:bg-sky-600 text-bgDark font-black text-xs px-4 rounded-xl transition flex items-center gap-1 shrink-0 ml-auto md:ml-0">
                        <i class="fas fa-paper-plane"></i> 更新
                    </button>
                </div>
            </div>
            <div id="dash-memo-status" class="text-[10px] font-bold text-accentGreen mt-1 empty:hidden"></div>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="bg-cardBg border border-borderStroke rounded-2xl p-4 shadow-xl overflow-x-auto no-scrollbar">
                <h2 class="text-base font-black text-accentBlue border-b border-borderStroke/60 pb-3 mb-4 flex items-center gap-2 sticky left-0">
                    <i class="fas fa-broadcast-tower"></i> 本線基幹ルート (親局直受)
                </h2>
                <table class="w-full text-center text-xs min-w-[650px]">
                    <thead><tr class="text-[11px] text-slate-400 font-bold tracking-wider"><th class="text-left pb-2 w-[24%] text-sm">対象回線</th><th class="w-[19%] pb-2">技術</th><th class="w-[19%] pb-2">走行</th><th class="w-[19%] pb-2">リハ</th><th class="w-[19%] pb-2 text-accentBlue font-black">本番</th></tr></thead>
                    <tbody id="group-main" class="divide-y divide-borderStroke/30"></tbody>
                </table>
            </div>

            <div class="bg-cardBg border border-borderStroke rounded-2xl p-4 shadow-xl overflow-x-auto no-scrollbar">
                <h2 class="text-base font-black text-accentOrange border-b border-borderStroke/60 pb-3 mb-4 flex items-center gap-2 sticky left-0">
                    <i class="fas fa-route"></i> 中継所リレーリンク
                </h2>
                <table class="w-full text-center text-xs min-w-[650px]">
                    <thead><tr class="text-[11px] text-slate-400 font-bold tracking-wider"><th class="text-left pb-2 w-[24%] text-sm">対象回線</th><th class="w-[19%] pb-2">技術</th><th class="w-[19%] pb-2">走行</th><th class="w-[19%] pb-2">リハ</th><th class="w-[19%] pb-2 text-accentOrange font-black">本番</th></tr></thead>
                    <tbody id="group-relay" class="divide-y divide-borderStroke/30"></tbody>
                </table>
            </div>

            <div class="bg-cardBg border border-borderStroke rounded-2xl p-4 shadow-xl overflow-x-auto no-scrollbar">
                <h2 class="text-base font-black text-slate-300 border-b border-borderStroke/60 pb-3 mb-4 flex items-center gap-2 sticky left-0">
                    <i class="fas fa-shield-alt"></i> 予備・特設・ヘリ系統
                </h2>
                <table class="w-full text-center text-xs min-w-[650px]">
                    <thead><tr class="text-[11px] text-slate-400 font-bold tracking-wider"><th class="text-left pb-2 w-[24%] text-sm">対象回線</th><th class="w-[19%] pb-2">技術</th><th class="w-[19%] pb-2">走行</th><th class="w-[19%] pb-2">リハ</th><th class="w-[19%] pb-2 text-slate-300 font-black">本番</th></tr></thead>
                    <tbody id="group-sub" class="divide-y divide-borderStroke/30"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="view-input" class="view-content p-4 space-y-6">
        <div class="w-full max-w-sm mx-auto bg-cardBg border border-borderStroke p-5 rounded-2xl shadow-xl space-y-4">
            <h2 class="text-sm font-black text-accentBlue border-b border-borderStroke/60 pb-3 text-center flex items-center justify-center gap-2">
                <i class="fas fa-edit"></i> 電界データ＆Ch入力
            </h2>
            
            <div class="space-y-3 text-xs">
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">① 対象回線 (リンク)</label>
                    <select id="link-select" onchange="saveInputState(); fetchCurrentRecord();" class="w-full bg-bgDark border border-borderStroke rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-accentBlue appearance-none font-bold"></select>
                </div>

                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold uppercase tracking-wider">② 現在のフェーズ (日程)</label>
                    <select id="phase-select" onchange="saveInputState(); fetchCurrentRecord();" class="w-full bg-bgDark border border-borderStroke rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-accentBlue appearance-none font-bold">
                        <option value="tech">技術テスト</option>
                        <option value="run">走行テスト</option>
                        <option value="rehe">リハーサル</option>
                        <option value="prod" selected>本番</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] text-amber-400 mb-1 font-bold uppercase tracking-wider">③ 使用FPUチャンネル / FPU Channel</label>
                    <div class="flex gap-2">
                        <select id="channel-select" onchange="syncChannelInput(); saveInputState();" class="flex-1 bg-bgDark border border-amber-500/30 text-amber-400 rounded-xl px-3 py-3 text-xs outline-none focus:border-accentBlue font-bold">
                            <option value="">-- 選択 --</option>
                            <option value="C1">C1</option><option value="C2">C2</option><option value="C3">C3</option><option value="C4">C4</option>
                            <option value="E1">E1</option><option value="E2">E2</option><option value="E3">E3</option><option value="E4">E4</option>
                            <option value="E5">E5</option><option value="E6">E6</option><option value="E7">E7</option><option value="E8">E8</option>
                            <option value="F1">F1</option><option value="F2">F2</option><option value="F3">F3</option><option value="F4">F4</option>
                            <option value="F5">F5</option><option value="F6">F6</option><option value="F7">F7</option><option value="F8">F8</option>
                        </select>
                        <select id="polarization-select" onchange="syncChannelInput(); saveInputState();" class="w-[65px] bg-bgDark border border-amber-500/30 text-amber-400 rounded-xl px-2 py-3 text-xs text-center outline-none focus:border-accentBlue font-bold">
                            <option value="">偏波</option>
                            <option value="H">H</option>
                            <option value="V">V</option>
                        </select>
                        <input type="text" id="channel-custom-input" oninput="saveInputState();" placeholder="手入力可" class="w-[95px] bg-bgDark border border-amber-500/60 text-amber-400 rounded-xl px-3 py-3 text-sm text-center outline-none focus:border-accentBlue font-black uppercase placeholder-slate-600">
                    </div>
                </div>

                <div class="text-center pt-2">
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">④ 電界強度数値入力</label>
                    <div class="flex items-center justify-center gap-3 my-3">
                        <button onclick="changeValue(-5)" class="w-11 h-11 bg-bgDark border border-borderStroke text-white text-sm font-black rounded-xl active:bg-slate-800 transition">-5</button>
                        <button onclick="changeValue(-1)" class="w-11 h-11 bg-bgDark border border-borderStroke text-white text-sm font-black rounded-xl active:bg-slate-800 transition">-1</button>
                        <div class="w-24 text-center font-mono font-black text-3xl tracking-tight text-white flex items-baseline justify-center">
                            <span id="db-value">60</span><span class="text-xs text-slate-500 font-sans ml-0.5">dB</span>
                        </div>
                        <button onclick="changeValue(1)" class="w-11 h-11 bg-bgDark border border-borderStroke text-white text-sm font-black rounded-xl active:bg-slate-800 transition">+1</button>
                        <button onclick="changeValue(5)" class="w-11 h-11 bg-bgDark border border-borderStroke text-white text-sm font-black rounded-xl active:bg-slate-800 transition">+5</button>
                    </div>
                </div>

                <div class="space-y-2 pt-1 border-t border-borderStroke/40">
                    <div>
                        <label class="block text-[10px] text-emerald-400 font-bold uppercase mb-1">現場メモ / Field Memo</label>
                        <input type="text" id="input-field-memo" placeholder="例: アンテナ追尾完了、安定" class="w-full bg-bgDark border border-borderStroke rounded-xl px-3 py-2.5 text-white text-xs outline-none focus:border-accentGreen placeholder-slate-600 block transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] text-accentBlue font-bold uppercase mb-1">センターメモ / Center Memo</label>
                        <input type="text" id="input-center-memo" placeholder="例: センター側DAdown確認" class="w-full bg-bgDark border border-borderStroke rounded-xl px-3 py-2.5 text-white text-xs outline-none focus:border-accentBlue placeholder-slate-600 block transition-all">
                    </div>
                </div>

                <button onclick="submitToSupabase()" id="btnSubmit" class="w-full bg-accentGreen hover:bg-emerald-600 text-bgDark font-black text-sm py-3 rounded-xl transition active:scale-[0.98] shadow-lg flex items-center justify-center gap-2 mt-2">
                    <i class="fas fa-cloud-upload-alt"></i> データとCh情報を送信
                </button>
                
                <div id="status-msg" class="text-center text-[11px] font-bold min-height-[20px] pt-1"></div>
            </div>
        </div>
    </div>

    <div id="view-maintenance" class="view-content p-4 space-y-6">
        <div class="w-full max-w-md mx-auto space-y-5">
            
            <div class="bg-cardBg border border-borderStroke p-5 rounded-2xl shadow-xl space-y-4">
                <h2 class="text-xs font-black text-accentBlue uppercase tracking-wider flex items-center gap-2">
                    <i class="fas fa-plus-circle text-amber-400"></i> 受信点（リンク）の新規追加
                </h2>
                <div class="space-y-3 text-xs">
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 font-bold">受信点名 / Link Name</label>
                        <input type="text" id="link-name" placeholder="例: 1区 A山基地局 ➔ マスタ" class="w-full bg-bgDark border border-borderStroke rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-accentBlue placeholder-slate-600 block transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1 font-bold">ブロックカテゴリ / Category</label>
                        <select id="link-category" class="w-full bg-bgDark border border-borderStroke rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-accentBlue font-bold appearance-none">
                            <option value="main">本線局直受 (main)</option>
                            <option value="relay">中継所リレー (relay)</option>
                            <option value="sub">予備・特設・ヘリ局 (sub)</option>
                        </select>
                    </div>
                    <button onclick="submitNewLink()" class="w-full bg-accentGreen hover:bg-emerald-600 text-bgDark font-black text-sm py-3 rounded-xl transition active:scale-[0.98] shadow-lg flex items-center justify-center gap-2">
                        <i class="fas fa-save"></i> この大会に受信点を追加
                    </button>
                </div>
            </div>

            <div class="bg-cardBg border border-borderStroke p-5 rounded-2xl shadow-xl space-y-4">
                <div class="border-b border-borderStroke/60 pb-3">
                    <h2 class="text-xs font-black text-slate-400 uppercase tracking-wider flex items-center gap-2">
                        <i class="fas fa-sort-amount-down text-accentBlue"></i> グループ別・ドラッグ並び替え
                    </h2>
                    <p class="text-[10px] text-slate-400 font-bold mt-1">※各グループ内でドラッグ後、最下部のボタンで一括確定・保存します。</p>
                </div>

                <div class="space-y-1.5">
                    <div class="text-[11px] font-black text-accentBlue uppercase tracking-wider flex items-center gap-1">
                        <i class="fas fa-broadcast-tower text-[10px]"></i> 本線基幹ルート 内の並び順
                    </div>
                    <div id="maint-box-main" class="space-y-1.5 bg-bgDark/40 p-2 rounded-xl min-h-[50px] border border-borderStroke/30"></div>
                </div>

                <div class="space-y-1.5 pt-2">
                    <div class="text-[11px] font-black text-accentOrange uppercase tracking-wider flex items-center gap-1">
                        <i class="fas fa-route text-[10px]"></i> 中継所リレーリンク 内の並び順
                    </div>
                    <div id="maint-box-relay" class="space-y-1.5 bg-bgDark/40 p-2 rounded-xl min-h-[50px] border border-borderStroke/30"></div>
                </div>

                <div class="space-y-1.5 pt-2">
                    <div class="text-[11px] font-black text-slate-400 uppercase tracking-wider flex items-center gap-1">
                        <i class="fas fa-shield-alt text-[10px]"></i> 予備・特設・ヘリ系統 内の並び順
                    </div>
                    <div id="maint-box-sub" class="space-y-1.5 bg-bgDark/40 p-2 rounded-xl min-h-[50px] border border-borderStroke/30"></div>
                </div>

                <div class="pt-2 border-t border-borderStroke/60">
                    <button onclick="saveGroupedOrder()" id="btn-save-order" class="w-full bg-accentBlue hover:bg-sky-600 text-bgDark font-black text-xs py-3 rounded-xl transition shadow-md flex items-center justify-center gap-1.5">
                        <i class="fas fa-check-circle"></i> 全グループの並び順を確定して適用
                    </button>
                    <div id="order-status-msg" class="text-[10px] font-bold text-center mt-1.5 empty:hidden"></div>
                </div>
            </div>

        </div>
    </div>

    <div class="bottom-nav fixed bottom-0 left-0 w-full h-[65px] bg-cardBg border-t border-borderStroke flex z-40 pb-[env(safe-area-inset-bottom,0px)]">
        <button id="nav-dashboard" onclick="switchView('dashboard')" class="flex-1 bg-none border-none text-accentBlue flex flex-col justify-center items-center gap-1 active:bg-slate-800/40 transition">
            <span class="text-base"><i class="fas fa-chart-bar"></i></span>
            <span class="text-[9px] font-bold">ダッシュボード</span>
        </button>
        <button id="nav-input" onclick="switchView('input')" class="flex-1 bg-none border-none text-slate-500 flex flex-col justify-center items-center gap-1 active:bg-slate-800/40 transition">
            <span class="text-base"><i class="fas fa-pen-to-square"></i></span>
            <span class="text-[9px] font-bold">データ入力</span>
        </button>

<script>
    const SUPABASE_URL = "https://iyzadjupyejeyeeyvwqm.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5emFkanVweWVqZXllZXl2d3FtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1OTE2NjgsImV4cCI6MjA5OTE2NzY2OH0.T6oXWP6s35wg77Nzuez7zrWVg49n6FFI0NzkW9z6QCQ";
    
    const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
    
    let activeProgramId = "";
    let activeProgramTitle = "";

    async function fetchProgramsList() {

    function openCreateModal() { document.getElementById('create-modal').classList.replace('hidden', 'flex'); }
    function closeCreateModal() { 
        document.getElementById('create-modal').classList.replace('flex', 'hidden'); 
        document.getElementById('new-program-id').value = ''; 
        document.getElementById('new-program-title').value = ''; 
    }

    async function submitNewProgram() {
        if (!sb) return;
        const idInput = document.getElementById('new-program-id').value.trim();
        const titleInput = document.getElementById('new-program-title').value.trim();
        
        if (!idInput) { alert("番組IDを入力してください。"); return; }
        if (!titleInput) { alert("番組名を入力してください。"); return; }
        
        // 半角英数字とハイフン・アンダースコアチェック (簡易版)
        if (!/^[a-zA-Z0-9-_]+$/.test(idInput)) {
            alert("番組IDは半角英数字、ハイフン(-)、アンダーバー(_)のみ使用できます。");
            return;
        }

        try {
            const { error } = await sb.from('programs').insert([{ id: idInput, title: titleInput }]);
            if (error) {
                if (error.code === '23505') throw new Error("この番組IDは既に登録されています。別のIDを入力してください。");
                throw error;
            }
            closeCreateModal(); fetchProgramsList();
        } catch (err) { alert("作成失敗: " + err.message); }
    }

    /* 番組名編集モーダルの制御 */
    function openEditProgramModal() {
        if (!activeProgramId) return;
        document.getElementById('edit-program-title').value = activeProgramTitle;
        document.getElementById('edit-program-modal').classList.replace('hidden', 'flex');
    }
    function closeEditProgramModal() {
        document.getElementById('edit-program-modal').classList.replace('flex', 'hidden');
        document.getElementById('edit-program-title').value = '';
    }
    async function submitEditProgramTitle() {
        if (!sb || !activeProgramId) return;
        const newTitle = document.getElementById('edit-program-title').value.trim();
        if (!newTitle) { alert("番組名を入力してください。"); return; }

        try {
            const { error } = await sb.from('programs').update({ title: newTitle }).eq('id', activeProgramId);
            if (error) throw error;
            
            activeProgramTitle = newTitle;
            document.getElementById('active-program-display').innerText = activeProgramTitle;
            closeEditProgramModal();
        } catch (err) { alert("番組名の変更に失敗しました: " + err.message); }
    }

    function selectProgramAndStart(id, title) {
        activeProgramId = id; activeProgramTitle = title;
        document.getElementById('active-program-display').innerText = activeProgramTitle;
        document.getElementById('btn-edit-program').classList.remove('hidden'); // 編集ペンアイコンを表示
        document.getElementById('welcome-view').classList.add('hidden');
        initDashboard();
        loadDashboardLinkSelect();
    }

    function switchView(viewName) {
        if (!activeProgramId) return;
        ['dashboard', 'input', 'maintenance'].forEach(v => {
            const btn = document.getElementById(`nav-${v}`);
            const content = document.getElementById(`view-${v}`);
            if (v === viewName) { btn.classList.replace('text-slate-500', 'text-accentBlue'); content.classList.add('active'); } 
            else { btn.classList.replace('text-accentBlue', 'text-slate-500'); content.classList.remove('active'); }
        });
        if (viewName === 'dashboard') { initDashboard(); loadDashboardLinkSelect(); } 
        else if (viewName === 'input') { loadInputLinks(); } 
        else if (viewName === 'maintenance') { loadRegisteredLinks(); }
        window.scrollTo(0,0);
    }

    /* ===================================================＿＿＿
       【画面1】ダッシュボード表示ロジック
       =================================================== */
    async function initDashboard() {
        if (!sb || !activeProgramId) return;
        document.getElementById('group-main').innerHTML = '';
        document.getElementById('group-relay').innerHTML = '';
        document.getElementById('group-sub').innerHTML = '';

        try {
            const { data: links, error: linkErr } = await sb.from('links').select('*').eq('program_id', activeProgramId).order('sort_order', { ascending: true });
            if (linkErr) throw linkErr;

            if (links) {
                links.forEach(link => {
                    let targetId = 'group-sub';
                    if (link.category === 'main') targetId = 'group-main';
                    if (link.category === 'relay') targetId = 'group-relay';
                    const tbody = document.getElementById(targetId);
                    if (tbody) {
                        const tr = document.createElement('tr');
                        tr.id = `row-${link.id}`;
                        tr.className = "hover:bg-slate-800/20 transition-colors";
                        tr.innerHTML = `
                            <td class="text-left font-black py-3 text-slate-200 link-label text-sm pr-2">${link.name}</td>
                            <td class="phase-tech p-1 align-top"></td>
                            <td class="phase-run p-1 align-top"></td>
                            <td class="phase-rehe p-1 align-top"></td>
                            <td class="phase-prod p-1 align-top"></td>
                        `;
                        tbody.appendChild(tr);
                        ['tech','run','rehe','prod'].forEach(p => updateCellSkeleton(link.id, p));
                    }
                });
            }

            const { data: records, error: recErr } = await sb.from('records').select('*').eq('program_id', activeProgramId);
            if (!recErr && records) { 
                records.forEach(rec => updateCell(rec.link_id, rec.phase, parseInt(rec.value, 10), rec.field_memo, rec.center_memo, rec.fpu_channel)); 
            }

            sb.removeAllChannels();
            sb.channel('live-records-filter').on('postgres_changes', { event: '*', schema: 'public', table: 'records' }, payload => {
                const updated = payload.new || payload.old;
                if (updated && updated.program_id === activeProgramId) { 
                    if (payload.eventType === 'DELETE') { updateCellSkeleton(updated.link_id, updated.phase); } 
                    else { updateCell(updated.link_id, updated.phase, parseInt(updated.value, 10), updated.field_memo, updated.center_memo, updated.fpu_channel, true); }
                }
            }).subscribe();

        } catch (e) { console.error(e); }
    }

    function updateCellSkeleton(linkId, phase) {
        const row = document.getElementById(`row-${linkId}`);
        if (!row) return;
        const cell = row.querySelector(`.phase-${phase}`);
        if (cell) {
            cell.innerHTML = `
                <div class="bg-slate-900/40 border border-transparent rounded-xl p-2 min-h-[75px] flex flex-col justify-center items-center">
                    <div class="text-base font-mono font-bold text-slate-600">--</div>
                </div>`;
        }
    }

    function updateCell(linkId, phase, value, fMemo, cMemo, fpuChannel, isLive = false) {
        const row = document.getElementById(`row-${linkId}`);
        if (!row) return;
        const cell = row.querySelector(`.phase-${phase}`);
        if (!cell || isNaN(value)) return;

        let statusColor = 'text-accentGreen';
        let bgStyle = 'bg-emerald-950/20 border-emerald-500/20';
        if (value < 35) { statusColor = 'text-rose-400'; bgStyle = 'bg-rose-950/30 border-rose-500/20'; }
        else if (value < 50) { statusColor = 'text-amber-400'; bgStyle = 'bg-amber-950/20 border-amber-500/20'; }

        let chDisplayHtml = "";
        if (fpuChannel) {
            chDisplayHtml = `<span class="bg-amber-500/10 border border-amber-500/40 text-amber-400 text-xs font-black px-1.5 py-0.5 rounded font-mono uppercase tracking-normal mr-2">${fpuChannel}</span>`;
        }

        let memoHtml = "";
        if (fMemo) memoHtml += `<div class="text-[11px] text-emerald-400 font-bold truncate leading-tight">現:${fMemo}</div>`;
        if (cMemo) memoHtml += `<div class="text-[11px] text-accentBlue font-bold truncate leading-tight">セ:${cMemo}</div>`;

        cell.innerHTML = `
            <div class="cell-box ${bgStyle} border rounded-xl p-2 min-h-[78px] flex flex-col justify-between transition-all shadow-sm">
                <div class="w-full flex-1 flex items-center justify-center py-1">
                    <div class="flex items-center justify-center">
                        ${chDisplayHtml}
                        <div class="${statusColor} text-2xl font-mono font-black tracking-tighter flex items-baseline justify-center">
                            ${value}<span class="text-[10px] font-sans font-black ml-0.5 opacity-80">dB</span>
                        </div>
                    </div>
                </div>
                <div class="space-y-0.5 text-left w-full border-t border-slate-800/20 pt-1 mt-auto">
                    ${memoHtml || '<div class="text-[10px] text-slate-600 italic text-center">--</div>'}
                </div>
            </div>`;

        if (isLive) {
            const box = cell.querySelector('.cell-box');
            box.style.outline = "2px solid #38bdf8";
            setTimeout(() => { box.style.outline = "none"; }, 800);
        }
    }

    async function loadDashboardLinkSelect() {
        if (!sb || !activeProgramId) return;
        const { data } = await sb.from('links').select('*').eq('program_id', activeProgramId).order('sort_order', { ascending: true });
        const dashSelect = document.getElementById('dash-link-select');
        if (data && data.length > 0) { dashSelect.innerHTML = data.map(l => `<option value="${l.id}">${l.name}</option>`).join(''); } 
        else { dashSelect.innerHTML = '<option value="">回線なし</option>'; }
    }

    async function submitDashCenterMemo() {
        if (!sb) return;
        const linkId = document.getElementById('dash-link-select').value;
        const phase = document.getElementById('dash-phase-select').value;
        const fpuCh = document.getElementById('dash-channel-input').value.trim();
        const cMemo = document.getElementById('dash-center-memo').value.trim();
        const statusEl = document.getElementById('dash-memo-status');
        if (!linkId || !phase) return;

        statusEl.innerText = "⚡ 送信中...";
        statusEl.className = "text-[11px] font-bold text-slate-400";

        const { data: currentRec } = await sb.from('records').select('value, field_memo, fpu_channel').eq('program_id', activeProgramId).eq('link_id', linkId).eq('phase', phase).maybeSingle();
        const existingVal = currentRec ? currentRec.value : 60;
        const existingFieldMemo = currentRec ? currentRec.field_memo : "";
        const finalCh = fpuCh ? fpuCh : (currentRec ? currentRec.fpu_channel : "");

        const { error } = await sb.from('records').upsert({
            program_id: activeProgramId, link_id: linkId, phase: phase, value: existingVal, field_memo: existingFieldMemo, center_memo: cMemo, fpu_channel: finalCh
        }, { onConflict: 'program_id,link_id,phase' });

        if (error) {
            statusEl.innerText = "⚠️ 更新失敗: " + error.message; statusEl.className = "text-[11px] font-bold text-rose-400";
        } else {
            statusEl.innerText = "✔ センターメモとCh情報を同期しました";
            statusEl.className = "text-[11px] font-bold text-accentGreen bg-emerald-950/20 p-1 rounded mt-1 inline-block";
            document.getElementById('dash-center-memo').value = "";
            document.getElementById('dash-channel-input').value = "";
            setTimeout(() => { statusEl.innerText = ""; }, 3000);
            initDashboard();
        }
    }

    /* ===================================================
       【画面2】現場データ入力ロジック
       =================================================== */
    async function loadInputLinks() {
        if (!sb || !activeProgramId) return;
        const { data, error } = await sb.from('links').select('*').eq('program_id', activeProgramId).order('sort_order', { ascending: true });
        if (!error && data) {
            const linkSelect = document.getElementById('link-select');
            const phaseSelect = document.getElementById('phase-select');

            if (data.length > 0) { 
                linkSelect.innerHTML = data.map(l => `<option value="${l.id}">${l.name}</option>`).join(''); 
                
                const savedLinkId = localStorage.getItem(`fpu_saved_link_${activeProgramId}`);
                const savedPhase = localStorage.getItem(`fpu_saved_phase_${activeProgramId}`);
                const savedCustomCh = localStorage.getItem(`fpu_saved_custom_ch_${activeProgramId}`);

                if (savedLinkId && data.some(l => l.id === savedLinkId)) { linkSelect.value = savedLinkId; }
                if (savedPhase) { phaseSelect.value = savedPhase; }
                if (savedCustomCh) { document.getElementById('channel-custom-input').value = savedCustomCh; }

                fetchCurrentRecord(); 
            } else { linkSelect.innerHTML = '<option value="">登録回線なし</option>'; }
        }
    }

    function syncChannelInput() {
        const chBase = document.getElementById('channel-select').value;
        const pol = document.getElementById('polarization-select').value;
        if(chBase || pol) {
            document.getElementById('channel-custom-input').value = chBase + pol;
        }
    }

    function saveInputState() {
        if (!activeProgramId) return;
        const linkId = document.getElementById('link-select').value;
        const phase = document.getElementById('phase-select').value;
        const customCh = document.getElementById('channel-custom-input').value.trim();
        
        if (linkId) localStorage.setItem(`fpu_saved_link_${activeProgramId}`, linkId);
        if (phase) localStorage.setItem(`fpu_saved_phase_${activeProgramId}`, phase);
        localStorage.setItem(`fpu_saved_custom_ch_${activeProgramId}`, customCh);
    }

    async function fetchCurrentRecord() {
        if (!sb) return;
        const linkId = document.getElementById('link-select').value;
        const phase = document.getElementById('phase-select').value;
        if (!activeProgramId || !linkId || !phase) return;

        const { data, error } = await sb.from('records').select('value, field_memo, center_memo, fpu_channel').eq('program_id', activeProgramId).eq('link_id', linkId).eq('phase', phase).maybeSingle();
        if (!error && data) { 
            currentVal = data.value !== null ? parseInt(data.value, 10) : 60;
            document.getElementById('input-field-memo').value = data.field_memo || "";
            document.getElementById('input-center-memo').value = data.center_memo || "";
            
            if (data.fpu_channel) {
                document.getElementById('channel-custom-input').value = data.fpu_channel;
                saveInputState();
            }
        } else { 
            currentVal = 60; 
            document.getElementById('input-field-memo').value = ""; 
            document.getElementById('input-center-memo').value = "";
            const savedCustomCh = localStorage.getItem(`fpu_saved_custom_ch_${activeProgramId}`);
            document.getElementById('channel-custom-input').value = savedCustomCh || "";
        }
        document.getElementById('db-value').innerText = currentVal;
    }

    function changeValue(amount) { currentVal = Math.max(0, Math.min(99, currentVal + amount)); document.getElementById('db-value').innerText = currentVal; }

    async function submitToSupabase() {
        if (!sb) return;
        const linkId = document.getElementById('link-select').value;
        const phase = document.getElementById('phase-select').value;
        const fpuCh = document.getElementById('channel-custom-input').value.trim();
        const fMemo = document.getElementById('input-field-memo').value.trim();
        const cMemo = document.getElementById('input-center-memo').value.trim();
        const msgEl = document.getElementById('status-msg');
        if (!activeProgramId || !linkId || !phase) return;

        msgEl.innerText = "⚡ TRANSMITTING...";
        msgEl.className = "text-slate-400 text-[10px] font-mono tracking-wider text-center animate-pulse";

        const { error } = await sb.from('records').upsert(
            { program_id: activeProgramId, link_id: linkId, phase: phase, value: parseInt(currentVal, 10), field_memo: fMemo, center_memo: cMemo, fpu_channel: fpuCh }, 
            { onConflict: 'program_id,link_id,phase' }
        );
        
        if (error) { msgEl.innerText = "⚠️ ERROR: " + error.message; msgEl.className = "text-rose-400 text-xs font-bold text-center"; } 
        else { 
            msgEl.innerText = "✔ TRANSMITTED SUCCESS"; 
            msgEl.className = "text-accentGreen text-xs font-bold text-center bg-emerald-950/20 border border-emerald-500/20 p-1 rounded-lg"; 
            setTimeout(() => { msgEl.innerText = ""; msgEl.className = ""; }, 2000); 
        }
    }

    /* ===================================================
       【画面3】メンテナンスロジック
       =================================================== */
    async function loadRegisteredLinks() {
        if (!sb || !activeProgramId) return;
        document.getElementById('order-status-msg').innerText = "";
        
        const boxMain = document.getElementById('maint-box-main');
        const boxRelay = document.getElementById('maint-box-relay');
        const boxSub = document.getElementById('maint-box-sub');

        try {
            const { data, error } = await sb.from('links').select('*').eq('program_id', activeProgramId).order('sort_order', { ascending: true });
            if (error) throw error;

            boxMain.innerHTML = ""; boxRelay.innerHTML = ""; boxSub.innerHTML = "";

            if (!data || data.length === 0) {
                const emptyMsg = '<div class="text-[11px] text-slate-600 italic py-1 text-center">回線がありません</div>';
                boxMain.innerHTML = emptyMsg; boxRelay.innerHTML = emptyMsg; boxSub.innerHTML = emptyMsg;
                destroyAllSortable(); return;
            }

            data.forEach(l => {
                let targetBox = boxSub;
                if (l.category === 'main') targetBox = boxMain;
                if (l.category === 'relay') targetBox = boxRelay;

                const itemHtml = `
                    <div data-id="${l.id}" class="bg-bgDark border border-borderStroke px-3 py-2.5 rounded-xl flex items-center justify-between gap-2 touch-none cursor-grab active:cursor-grabbing hover:border-slate-700 transition-colors">
                        <div class="flex items-center gap-2 flex-1 min-w-0 pointer-events-none">
                            <i class="fas fa-bars text-slate-600 text-[11px] mr-1 shrink-0"></i>
                            <div class="text-xs font-bold text-slate-200 truncate font-sans">${l.name}</div>
                        </div>
                        <div class="flex items-center gap-1.5 shrink-0">
                            <button onclick="event.stopPropagation(); editLinkName('${l.id}', '${l.name}')" class="px-2 h-6.5 bg-blue-950/40 border border-blue-500/40 text-accentBlue text-[11px] font-bold rounded hover:bg-accentBlue hover:text-bgDark transition"><i class="fas fa-edit"></i></button>
                            <button onclick="event.stopPropagation(); deleteLink('${l.id}', '${l.name}')" class="px-2 h-6.5 bg-rose-950/40 border border-rose-500/40 text-rose-400 text-[11px] font-bold rounded hover:bg-rose-500 hover:text-bgDark transition"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>`;
                targetBox.insertAdjacentHTML('beforeend', itemHtml);
            });

            if(boxMain.children.length === 0) boxMain.innerHTML = '<div class="text-[11px] text-slate-600 italic py-1 text-center">登録なし</div>';
            if(boxRelay.children.length === 0) boxRelay.innerHTML = '<div class="text-[11px] text-slate-600 italic py-1 text-center">登録なし</div>';
            if(boxSub.children.length === 0) boxSub.innerHTML = '<div class="text-[11px] text-slate-600 italic py-1 text-center">登録なし</div>';

            destroyAllSortable();
            const sortOptions = { animation: 150, ghostClass: 'sortable-ghost', chosenClass: 'sortable-chosen', forceFallback: true };
            
            if(boxMain.querySelector('[data-id]')) sortableInstances.main = new Sortable(boxMain, sortOptions);
            if(boxRelay.querySelector('[data-id]')) sortableInstances.relay = new Sortable(boxRelay, sortOptions);
            if(boxSub.querySelector('[data-id]')) sortableInstances.sub = new Sortable(boxSub, sortOptions);

        } catch (e) { console.error(e); }
    }

    function destroyAllSortable() {
        Object.keys(sortableInstances).forEach(k => {
            if (sortableInstances[k]) { sortableInstances[k].destroy(); sortableInstances[k] = null; }
        });
    }

    async function saveGroupedOrder() {
        if (!sb) return;
        const statusEl = document.getElementById('order-status-msg');
        
        const mainIds = sortableInstances.main ? sortableInstances.main.toArray() : [];
        const relayIds = sortableInstances.relay ? sortableInstances.relay.toArray() : [];
        const subIds = sortableInstances.sub ? sortableInstances.sub.toArray() : [];

        const totalOrderedIds = [...mainIds, ...relayIds, ...subIds];
        if (totalOrderedIds.length === 0) return;

        statusEl.innerText = "⚡ 各グループの順序を一括適用中...";
        statusEl.className = "text-[10px] font-bold text-slate-400 text-center animate-pulse";

        try {
            const promises = totalOrderedIds.map((id, index) => {
                return sb.from('links').update({ sort_order: index }).eq('id', id);
            });
            await Promise.all(promises);

            statusEl.innerText = "✔ グループごとの並び順をクラウドに適用しました！";
            statusEl.className = "text-[10px] font-bold text-accentGreen text-center bg-emerald-950/20 border border-emerald-500/20 p-1 rounded-lg mt-1 block";
            setTimeout(() => { statusEl.innerText = ""; }, 4000);
        } catch (e) {
            statusEl.innerText = "⚠️ 保存失敗: " + e.message; statusEl.className = "text-[10px] font-bold text-rose-400 text-center";
        }
    }

    async function submitNewLink() {
        if (!sb || !activeProgramId) return;
        const nameInput = document.getElementById('link-name').value.trim();
        const catSelect = document.getElementById('link-category').value;
        if (!nameInput) return;
        try {
            const { count } = await sb.from('links').select('*', { count: 'exact', head: true }).eq('program_id', activeProgramId);
            const { error } = await sb.from('links').insert([{ id: "link-" + Date.now(), program_id: activeProgramId, name: nameInput, category: catSelect, sort_order: count || 0 }]);
            if (error) throw error;
            document.getElementById('link-name').value = ''; 
            loadRegisteredLinks();
        } catch (err) { alert("登録エラー: " + err.message); }
    }

    async function editLinkName(id, currentName) {
        const newName = prompt(`「${currentName}」の新しい受信点名を入力してください:`, currentName);
        if (newName === null) return;
        const trimmed = newName.trim();
        if (!trimmed || trimmed === currentName) return;

        try {
            const { error } = await sb.from('links').update({ name: trimmed }).eq('id', id);
            if (error) throw error;
            loadRegisteredLinks();
        } catch (e) { alert("名前の変更に失敗しました: " + e.message); }
    }

    async function deleteLink(id, name) {
        if (!confirm(`本当に「${name}」を削除してもよろしいですか？\n※関連するすべての電界強度データやメモも同時に消去されます。`)) return;

        try {
            await sb.from('records').delete().eq('link_id', id);
            const { error } = await sb.from('links').delete().eq('id', id);
            if (error) throw error;
            loadRegisteredLinks();
        } catch (e) { alert("削除に失敗しました: " + e.message); }
    }
</script>
</body>
